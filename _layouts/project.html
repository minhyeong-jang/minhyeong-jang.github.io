---
layout: default
---
<div id="cover"
  {% if page.image %}
    style="background-image: url({{ site.image_url }}{{ page.image }})"
  {% endif %}>
  <div class="mouse-scroll">
    <img src="{{ site.image_url }}/design/icon-mouse-scroll.png" alt="mouse-scroll">
  </div>
</div>

<div id="post-content">
  <div class="reponsive-content">
    <div class="post-info">
      <p class="post-date red">{{ page.date | date: '%Y년 %m월 %d일' }}</p>
      <h1 class="post-title">{{ page.title }}</h1>
    </div>
    <div>{{ content }}</div>
  </div>
</div>
{% include related-posts.html %}
