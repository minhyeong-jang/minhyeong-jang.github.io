<div id="header">
  <div class="top">
    <a href="{{ site.baseurl }}/">Doriri</a>
    <button type="button" class="menu-btn" aria-label="메뉴 열기/닫기" aria-expanded="false"></button>
  </div>

  <ul class="menu">
    <li class="{% if page.url == '/' or page.url == '/about' %} active {% endif %}">
      <a href="{{ '/' | prepend: site.baseurl }}">About</a>
    </li>
    {% for category in site.categories %}
    <li>
      <a href="{{ site.baseurl }}/category/{{ category.name }}">{{ category.title }}</a>
    </li>
    {% endfor %}
  </ul>
</div>
